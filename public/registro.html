<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BankFlow - Crear Cuenta</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2>Únete a BankFlow</h2>
        <form id="register-form">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="reg-nombre" placeholder="Manolo Caceres" required>
            </div>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
            </div>
            <button type="submit" class="btn-login">Crear cuenta</button>
            <!-- Captcha simulado -->
            <div id="captcha-box" style="
                display: flex;
                align-items: center;
                gap: 12px;
                border: 1px solid #d0d5dd;
                border-radius: 8px;
                padding: 12px 16px;
                background: #f9fafb;
                margin-top: 10px;
                user-select: none;
                cursor: pointer;
            " onclick="toggleCaptcha()">
                <div id="captcha-check" style="
                    width: 22px;
                    height: 22px;
                    border: 2px solid #aaa;
                    border-radius: 4px;
                    background: white;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-shrink: 0;
                    transition: all 0.2s;
                "></div>
                <span style="font-size: 0.9rem; color: #444;">No soy un robot</span>
                <div style="margin-left: auto; text-align: center; opacity: 0.5;">
                    <div style="font-size: 1.4rem;">🔒</div>
                    <div style="font-size: 0.6rem; color: #888;">reCAPTCHA</div>
                </div>
            </div>
            <input type="hidden" id="captcha-verified" value="false">
        </form>
        <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
    </div>
</div>
<button id="btn-chat-toggle" class="chat-fab">
    <span class="chat-icon">💬</span> Asistente IA
</button>

<div id="chat-container" class="chat-window" style="display: none;">
    <div class="chat-header">
        <span>Asistente BankFlow</span>
        <button id="btn-close-chat" class="close-btn">×</button>
    </div>
    <div id="chat-messages" class="chat-body">
    </div>
    <div class="chat-footer">
        <input type="text" id="chat-input" placeholder="Escribe tu consulta...">
    </div>
</div>
<script type="module" src="assets/js/auth-register.js"></script>
<script>
function toggleCaptcha() {
    const box = document.getElementById('captcha-check');
    const verified = document.getElementById('captcha-verified');
    const isChecked = verified.value === 'true';

    if (!isChecked) {
        // Mostrar spinner brevemente, luego check
        box.innerHTML = '<div style="width:14px;height:14px;border:2px solid #1a2a6c;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></div>';
        setTimeout(() => {
            box.style.background = '#1a2a6c';
            box.style.borderColor = '#1a2a6c';
            box.innerHTML = '<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 5L5 9L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            verified.value = 'true';
        }, 700);
    } else {
        box.style.background = 'white';
        box.style.borderColor = '#aaa';
        box.innerHTML = '';
        verified.value = 'false';
    }
}
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
