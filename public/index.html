<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankFlow - Iniciar Sesión</title>
  <!-- CSS Externo -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="logo">
      <h1>Bank<span>Flow</span></h1>
    </div>
    <h2>Bienvenido de nuevo</h2>
    <p>Introduce tus credenciales para acceder a tu cuenta</p>

    <form id="login-form">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
    </div>
  </div>
</div>

<!-- Lógica de Firebase (Módulo) -->
<script type="module" src="assets/js/auth-login.js"></script>
</body>
</html>
